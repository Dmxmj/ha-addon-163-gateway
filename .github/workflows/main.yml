name: Build and Publish Add-on

on:
  push:
    branches: [ main ]
    paths:
      - "ha_to_163/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ main ]
    paths:
      - "ha_to_163/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write  # 允许推送镜像到GHCR
      contents: read   # 允许读取仓库内容

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # 自动生成的令牌，无需手动配置

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dmxmj/ha-addon-163-gateway
          tags: |
            type=raw,value=0.1.22  # 固定版本号（与config.json一致）
            type=raw,value=latest  # 最新标签
            type=sha,format=short  # 提交SHA标签

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./ha_to_163  # 构建上下文
          file: ./ha_to_163/Dockerfile  # Dockerfile路径
          push: ${{ github.event_name != 'pull_request' }}  # PR时不推送，仅构建
          platforms: |
            linux/amd64
            linux/arm/v7  # 对应armv7
            linux/arm64   # 对应aarch64
            linux/386     # 对应i386
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha  # 缓存构建依赖，加速下次构建
          cache-to: type=gha,mode=max
