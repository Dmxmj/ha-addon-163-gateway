name: Build and Publish Add-on
on:
  push:
    branches: [ main ]
    paths:
      - "ha_to_163/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ main ]
    paths:
      - "ha_to_163/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      # 关键：启用QEMU多架构模拟（无需修改）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # 关键：使用最新版Buildx（无需修改）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      # 拉取代码（无需修改）
      - name: Checkout code
        uses: actions/checkout@v4

      # 登录GHCR（无需修改）
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取镜像元数据（无需修改）
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dmxmj/ha-addon-163-gateway
          tags: |
            type=raw,value=0.1.22
            type=raw,value=latest
          flavor: |
            latest=true

      # 构建并推送多架构镜像（修正BUILD_FROM参数）
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: ./ha_to_163
          file: ./ha_to_163/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64  # 常用架构（99%设备覆盖）
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 关键修复：使用官方正确的多架构基础镜像
          build-args: |
            BUILD_FROM=homeassistant/container-base:latest
